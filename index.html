<!DOCTYPE html>
<html>
<head>

<title>AI Resume Screening System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">AI Resume Screening Dashboard</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Job Description</label>
<textarea class="form-control" name="job_description" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload Resumes</label>
<input class="form-control" type="file" name="resumes" multiple required>
</div>

<button class="btn btn-primary">Analyze Candidates</button>

</form>

{% if top_candidate %}

<div class="alert alert-success mt-4">
<b>Top Candidate:</b> {{top_candidate.name}} | Score: {{top_candidate.score}}
</div>

{% endif %}

{% if results %}

<table class="table table-bordered mt-4">

<tr>
<th>Candidate</th>
<th>Skills</th>
<th>Experience</th>
<th>Match Score</th>
</tr>

{% for r in results %}

<tr>
<td>{{r.name}}</td>
<td>{{r.skills}}</td>
<td>{{r.experience}}</td>
<td>{{r.score}}</td>
</tr>

{% endfor %}

</table>

{% endif %}

</div>

</body>
</html>
